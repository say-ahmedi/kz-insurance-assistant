<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>ИИ-ассистент: страховое право РК</title>
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif;
           max-width: 860px; margin: 2em auto; padding: 0 1em; color: #222; }
    h1 { font-size: 1.4em; }
    #chat { border: 1px solid #ddd; border-radius: 8px;
            padding: 1em; min-height: 300px; background: #fafafa;
            margin-bottom: 1em; white-space: pre-wrap; }
    .msg-user { background: #e8f0fe; padding: .8em; border-radius: 6px;
                margin: .5em 0; }
    .msg-bot  { background: #fff; padding: .8em; border-radius: 6px;
                margin: .5em 0; border: 1px solid #eee; }
    .sources { margin-top: .8em; font-size: .85em; color: #555; }
    .sources details { margin: .3em 0; }
    .sources summary { cursor: pointer; }
    textarea { width: 100%; padding: .8em; font-size: 1em;
               border-radius: 6px; border: 1px solid #ccc;
               box-sizing: border-box; resize: vertical; }
    button { padding: .7em 1.4em; font-size: 1em; background: #1a73e8;
             color: white; border: none; border-radius: 6px;
             cursor: pointer; margin-top: .5em; }
    button:disabled { background: #999; }
  </style>
</head>
<body>
  <h1>ИИ-ассистент по страховому законодательству РК</h1>
  <p style="color:#666">Задайте вопрос по законам РК о страховании. Ответ
     будет основан только на загруженных документах со ссылкой на статьи.</p>

  <div id="chat"></div>

  <textarea id="q" rows="3"
    placeholder="Например: Какова страховая сумма по ОГПОВТС? Каков срок исковой давности по договору страхования?"></textarea>
  <button id="send" onclick="ask()">Спросить</button>

  <script>
    const chat = document.getElementById("chat");
    const qBox = document.getElementById("q");
    const btn  = document.getElementById("send");

    function appendUser(text) {
      const d = document.createElement("div");
      d.className = "msg-user";
      d.textContent = "Вы: " + text;
      chat.appendChild(d);
    }
    function appendBot(data) {
      const d = document.createElement("div");
      d.className = "msg-bot";
      const ans = document.createElement("div");
      ans.textContent = data.answer;
      d.appendChild(ans);

      if (data.sources && data.sources.length) {
        const s = document.createElement("div");
        s.className = "sources";
        s.innerHTML = "<b>Источники:</b>";
        data.sources.forEach((src, i) => {
          const det = document.createElement("details");
          det.innerHTML =
            `<summary>[${i+1}] ${src.law} — ${src.article} ` +
            `<i>(совпадение: ${src.score})</i></summary>` +
            `<pre style="white-space:pre-wrap;font-size:.9em">${src.snippet}…</pre>`;
          s.appendChild(det);
        });
        d.appendChild(s);
      }
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
    }

    async function ask() {
      const q = qBox.value.trim();
      if (!q) return;
      appendUser(q);
      qBox.value = "";
      btn.disabled = true;
      btn.textContent = "Думаю…";
      try {
        const r = await fetch("/ask", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({query: q, k: 5}),
        });
        const data = await r.json();
        appendBot(data);
      } catch (e) {
        appendBot({answer: "Ошибка: " + e.message, sources: []});
      } finally {
        btn.disabled = false;
        btn.textContent = "Спросить";
      }
    }

    qBox.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) ask();
    });
  </script>
</body>
</html>
